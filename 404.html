<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Page Not Found — 207 Analytix</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'system';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-404">
    <div>
      <p class="page-404__code">404</p>
      <h1 class="page-404__title">Page not found</h1>
      <p class="page-404__sub">This route doesn't exist. Head back home.</p>
      <a href="index.html" class="btn btn--primary">Back to home</a>
    </div>
  </main>
  <script src="main.js"></script>
</body>
</html>
